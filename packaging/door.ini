# Telnetvision door config. Read each time the door launches, so edits take
# effect for the NEXT caller with no BBS restart. Put this next to the `door`
# binary (the Start-up Directory). Command-line flags, if any, override these.
#
# I/O is auto-detected: if a DOOR32.SYS dropfile is present in the working
# directory and its line 1 is `2` (telnet), the door talks to the inherited
# socket handle on line 2 (RA-family BBSes: EleBBS, RemoteAccess, Mystic,
# MagickaBBS). Otherwise it uses stdin/stdout (Synchronet's "Intercept
# Standard I/O" path). Pass -door32 "" to force stdio mode.

# --- Two INDEPENDENT axes ---

# Glyph encoding: which byte(s) to send for the half-block character.
#   cp437 = byte 0xDF   -> what SyncTERM / classic BBS terminals expect
#   utf8  = "▀" (U+2580) -> modern UTF-8 terminals (e.g. your local Mac terminal)
encoding = cp437

# Color depth (independent of the glyph above):
#   truecolor = 24-bit  -> recent SyncTERM and other capable clients
#   16        = CGA/ANSI -> classic 16-color, widest compatibility
# A modern SyncTERM caller wants: encoding = cp437, color = truecolor.
color = truecolor

channel = cam

# These only matter when color = 16:
saturation = 1.8
dither = true

# Render cap, frames per second.
fps = 15

# Show a brief "Press Q or ESC to quit" hint at the top for ~5s, then clear it.
hint = true

# Service location. Defaults are correct when the service runs on the same box.
# host = 127.0.0.1
# port = 7601

# Uncomment to log diagnostics (e.g. what keys reach stdin, DOOR32.SYS handle
# discovery, effective fps) to a file.
# debug = /sbbs/xtrn/telnetvision/door.log
